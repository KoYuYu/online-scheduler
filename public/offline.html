<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#287067" />
    <title>目前離線</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f8;
        --surface: #ffffff;
        --text: #17202e;
        --muted: #687588;
        --line: #dbe2ea;
        --primary: #287067;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        background: var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(420px, 100%);
        padding: 22px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 42px rgba(29, 42, 60, 0.08);
      }

      h1 {
        margin: 0;
        font-size: 1.2rem;
      }

      p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        margin-top: 18px;
        padding: 9px 14px;
        color: #ffffff;
        background: var(--primary);
        border-radius: 8px;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>目前沒有網路連線</h1>
      <p>預約時間與管理資料需要即時連線。請恢復網路後重新整理頁面。</p>
      <a href="/">重新整理</a>
    </main>
  </body>
</html>
